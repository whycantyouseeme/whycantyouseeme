<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>entry 1</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .container.ready {
      opacity: 1;
    }

    .rayquaza {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      width: min(35vw, 520px);

      height: auto;
      z-index: 1;
      pointer-events: none;
    }

    .ascii {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 2;
      pointer-events: none;
    }

    @media (max-width: 600px) {
      .rayquaza {
        width: 60vw;
      }
    }
  </style>
</head>

<body>
  <div class="container" id="container">
    <img src="assets/rayquaza.gif" class="rayquaza" />
    <img src="assets/fake-ascii.png" class="ascii"/>
  </div>

  <script>
    const container = document.getElementById("container");

    const img1 = new Image();
    const img2 = new Image();

    let loaded = 0;

    function checkReady() {
      loaded++;
      if (loaded === 2) {
        container.classList.add("ready");
      }
    }

    img1.onload = checkReady;
    img2.onload = checkReady;

    img1.src = "assets/rayquaza.gif";
    img2.src = "assets/fake-ascii.png";
  </script>
</body>
</html>
